name: Morning Gap Check

on:
  schedule:
    # 08:50 JST = 23:50 UTC (previous day), weekdays only
    - cron: '50 23 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run morning check
        run: uv run python scripts/morning_check.py

      - name: Upload market check result to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f data_cache/market_check.txt ]; then
            gh release upload data-latest \
              data_cache/market_check.txt \
              --clobber
          fi
