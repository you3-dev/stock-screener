name: Nightly Pipeline

on:
  schedule:
    # 21:00 JST = 12:00 UTC, weekdays only
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        run: uv run python scripts/run_pipeline.py

      - name: Commit and push data cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_cache/
          git diff --cached --quiet || git commit -m "Update data cache $(date -u +%Y-%m-%d)"
          git push
