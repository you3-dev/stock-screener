name: Morning Gap Check

on:
  schedule:
    # 08:50 JST = 23:50 UTC (previous day), weekdays only
    - cron: '50 23 * * 0-4'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run morning check
        run: uv run python scripts/morning_check.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_cache/market_check.txt
          git diff --cached --quiet || git commit -m "Morning gap check $(date -u +%Y-%m-%d)"
          git push
