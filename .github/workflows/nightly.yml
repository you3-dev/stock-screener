name: Nightly Pipeline

on:
  schedule:
    # 21:00 JST = 12:00 UTC, weekdays only
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        run: uv run python scripts/run_pipeline.py

      - name: Upload data to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release if it doesn't exist yet
          gh release view data-latest 2>/dev/null || \
            gh release create data-latest \
              --title "Latest data cache" \
              --notes "Auto-updated by nightly pipeline"
          # Upload parquet files (--clobber overwrites existing assets)
          gh release upload data-latest \
            data_cache/prices.parquet \
            data_cache/features.parquet \
            data_cache/backtest_results.parquet \
            data_cache/ticker_master.parquet \
            --clobber
